<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F2EDE4;
    font-family: "Courier New", monospace;
    color: #1C1C1C;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    padding-top: max(20px, env(safe-area-inset-top));
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: clamp(22px, 6vw, 40px);
    letter-spacing: 4px;
    margin: 10px 0 4px;
    color: #9B1C1C;
    text-shadow: 3px 3px 0 #1C1C1C;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 3px;
    margin-bottom: 18px;
    color: #1C1C1C;
    text-align: center;
  }

  .track {
    width: 100%;
    max-width: 700px;
    background: #E5DDCB;
    border: 4px solid #1C1C1C;
    padding: 0;
  }

  .lane {
    position: relative;
    height: 48px;
    border-bottom: 2px dashed #B45309;
    overflow: hidden;
  }
  .lane:last-child { border-bottom: none; }

  .lane-num {
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    font-weight: bold;
    color: #9B1C1C;
    z-index: 2;
  }

  .finish {
    position: absolute;
    right: 0;
    top: 0;
    width: 14px;
    height: 100%;
    background:
      repeating-conic-gradient(#1C1C1C 0% 25%, #F2EDE4 0% 50%) 0 0 / 14px 14px;
    z-index: 1;
  }

  .fly {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    image-rendering: pixelated;
    transition: none;
    z-index: 2;
  }

  .controls {
    margin-top: 22px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: "Courier New", monospace;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 12px 22px;
    background: #9B1C1C;
    color: #F2EDE4;
    border: 3px solid #1C1C1C;
    box-shadow: 4px 4px 0 #1C1C1C;
    cursor: pointer;
  }
  button:active { transform: translate(4px, 4px); box-shadow: none; }
  button:disabled { background: #B45309; cursor: not-allowed; }

  .winner {
    margin-top: 18px;
    min-height: 30px;
    font-size: 20px;
    letter-spacing: 2px;
    font-weight: bold;
    color: #9B1C1C;
    text-align: center;
  }

  /* "Add to home screen" hint */
  .install-hint {
    margin-top: 16px;
    max-width: 360px;
    font-size: 12px;
    line-height: 1.5;
    letter-spacing: 1px;
    text-align: center;
    color: #6B1111;
    border: 2px dashed #B45309;
    padding: 10px 14px;
  }
  /* Hide the hint once the app is running installed (standalone) */
  @media (display-mode: standalone) {
    .install-hint { display: none; }
  }
</style>
</head>
<body>
  <h1>FLY DERBY '85</h1>
  <div class="subtitle">EIGHT FLIES. ONE WINNER. NO REFUNDS.</div>

  <div class="track" id="track"></div>

  <div class="controls">
    <button id="startBtn">START RACE</button>
    <button id="resetBtn" disabled>RESET</button>
  </div>

  <div class="winner" id="winner"></div>

  <div class="install-hint" id="installHint">
    TIP: To install as an app, open this page in your phone browser,
    then tap Share &#8593; and choose "Add to Home Screen".
  </div>

<script>
  // A chunky 1980s pixel fly. Used both as the racer and as the app logo.
  function flySVG(color) {
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" shape-rendering="crispEdges">' +
      // wings
      '<rect x="1" y="3" width="4" height="2" fill="#B45309"/>' +
      '<rect x="0" y="5" width="5" height="3" fill="#B45309"/>' +
      '<rect x="1" y="8" width="4" height="2" fill="#B45309"/>' +
      '<rect x="11" y="3" width="4" height="2" fill="#B45309"/>' +
      '<rect x="11" y="5" width="5" height="3" fill="#B45309"/>' +
      '<rect x="11" y="8" width="4" height="2" fill="#B45309"/>' +
      // head
      '<rect x="6" y="2" width="4" height="3" fill="#1C1C1C"/>' +
      '<rect x="6" y="3" width="1" height="1" fill="' + color + '"/>' +
      '<rect x="9" y="3" width="1" height="1" fill="' + color + '"/>' +
      // body (striped)
      '<rect x="6" y="5" width="4" height="6" fill="' + color + '"/>' +
      '<rect x="6" y="7" width="4" height="1" fill="#1C1C1C"/>' +
      '<rect x="6" y="9" width="4" height="1" fill="#1C1C1C"/>' +
      // tail
      '<rect x="6" y="11" width="4" height="2" fill="#1C1C1C"/>' +
      // legs
      '<rect x="5" y="13" width="1" height="2" fill="#1C1C1C"/>' +
      '<rect x="7" y="13" width="1" height="2" fill="#1C1C1C"/>' +
      '<rect x="10" y="13" width="1" height="2" fill="#1C1C1C"/>' +
      '</svg>'
    );
  }

  const colors = ['#9B1C1C','#1C1C1C','#6B1111','#B45309','#9B1C1C','#1C1C1C','#6B1111','#B45309'];
  const track = document.getElementById('track');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const winnerEl = document.getElementById('winner');

  let flies = [];
  let racing = false;
  let raf = null;

  function buildTrack() {
    track.innerHTML = '';
    flies = [];
    for (let i = 0; i < 8; i++) {
      const lane = document.createElement('div');
      lane.className = 'lane';

      const num = document.createElement('div');
      num.className = 'lane-num';
      num.textContent = (i + 1);

      const finish = document.createElement('div');
      finish.className = 'finish';

      const fly = document.createElement('img');
      fly.className = 'fly';
      fly.src = flySVG(colors[i]);
      fly.style.left = '28px';

      lane.appendChild(num);
      lane.appendChild(finish);
      lane.appendChild(fly);
      track.appendChild(lane);

      flies.push({ el: fly, pos: 28, lane: lane });
    }
  }

  function startRace() {
    if (racing) return;
    racing = true;
    winnerEl.textContent = '';
    startBtn.disabled = true;
    resetBtn.disabled = false;

    flies.forEach(f => { f.pos = 28; f.el.style.left = '28px'; });

    function step() {
      let finishedFly = null;
      flies.forEach(f => {
        const laneWidth = f.lane.clientWidth;
        const finishLine = laneWidth - 34; // fly reaches the chequered flag
        // random little hop forward each frame = unpredictable winner
        f.pos += Math.random() * 3;
        if (f.pos >= finishLine) {
          f.pos = finishLine;
          if (!finishedFly) finishedFly = f;
        }
        f.el.style.left = f.pos + 'px';
      });

      if (finishedFly) {
        const num = flies.indexOf(finishedFly) + 1;
        winnerEl.textContent = '>>> FLY ' + num + ' WINS! <<<';
        racing = false;
        startBtn.disabled = false;
        return;
      }
      raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }

  function resetRace() {
    if (raf) cancelAnimationFrame(raf);
    racing = false;
    winnerEl.textContent = '';
    startBtn.disabled = false;
    resetBtn.disabled = true;
    flies.forEach(f => { f.pos = 28; f.el.style.left = '28px'; });
  }

  startBtn.addEventListener('click', startRace);
  resetBtn.addEventListener('click', resetRace);

  buildTrack();
</script>
</body>
</html>
